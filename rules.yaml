      purpose: Proposed synonyms for business terms and model objects

    - requirement_ids:
        - PBI-035
      file: security-validation.md
      purpose: RLS applicability and human validation evidence

    - requirement_ids:
        - PBI-036
        - PBI-037
        - PBI-038
        - PBI-039
        - PBI-040
        - PBI-041
        - PBI-042
        - PBI-043
        - PBI-044
        - PBI-045
        - PBI-046
        - PBI-047
        - PBI-048
        - PBI-049
      file: ai-preparation.md
      purpose: Manual Power BI AI preparation plan and confirmation checklist

    - requirement_ids:
        - PBI-050
        - PBI-051
        - PBI-052
        - PBI-053
        - PBI-054
        - PBI-055
      file: testing-plan.md
      purpose: Copilot and model-integrity test plan

# ------------------------------------------------------------
# EXCLUSIONS
# ------------------------------------------------------------

excluded_automation:
  - id: PBI-035
    requirement: Row-Level Security implementation and user-context validation
    reason: >-
      Security changes require model-specific human approval and testing.
      The agent may inspect and report security metadata but must not
      automatically create or change RLS under this ruleset.

  - ids:
      - PBI-014
      - PBI-015
      - PBI-016
      - PBI-017
      - PBI-018
      - PBI-019
      - PBI-020
      - PBI-021
    requirement: Relationship design changes
    reason: >-
      Relationships are protected by the relationship invariant.
      The agent assesses and reports relationship issues but does not
      automatically edit cardinality, activity, or filter direction.

  - id: PBI-033
    requirement: Synonym authoring
    reason: >-
      Synonym write operations may not be available in the connected
      MCP version. The agent produces a manual synonym proposal.

  - ids:
      - PBI-036
      - PBI-037
      - PBI-038
      - PBI-039
      - PBI-040
      - PBI-041
      - PBI-042
      - PBI-043
      - PBI-044
      - PBI-045
      - PBI-046
      - PBI-047
      - PBI-048
      - PBI-049
      - PBI-050
      - PBI-051
      - PBI-052
      - PBI-053
      - PBI-054
    requirement: Power BI Prep Data for AI and Copilot service configuration
    reason: >-
      These capabilities are configured and validated manually in
      Power BI Desktop or the Power BI service. The agent prepares
      content, recommendations, and test plans.

# ------------------------------------------------------------
# VALIDATION
# ------------------------------------------------------------

validation:
  requirement_ids:
    allowed_range: PBI-001..PBI-055
    require_zero_padding: true
    reject_letter_suffixes: true
    reject_unknown_ids: true

    explicitly_rejected_examples:
      # Historical IDs kept as validation fixtures.
      # They must never appear in repository requirements.
      - PBI-060
      - PBI-065
      - PBI-070
      - PBI-074
      - PBI-080
      - PBI-081
      - PBI-082

  source_ids:
    require_registry_entry: true
    registry: docs/microsoft/references.md

  pre_write:
    - confirm_baseline_snapshot_exists
    - confirm_change_plan_approved
    - confirm_target_requirement_exists_in_matrix
    - confirm_source_id_exists_in_registry
    - confirm_business_context_available

  post_write:
    - re_read_modified_objects
    - verify_targeted_requirements
    - verify_relationship_invariant
    - verify_dependent_expressions
    - export_tmdl_snapshot

# ------------------------------------------------------------
# RUN LOG
# ------------------------------------------------------------

run_log:
  path: docs/runs/{model}-{date}.md

  required_fields:
    - model
    - workspace
    - baseline_commit
    - baseline_snapshot
    - requirement_ids_assessed
    - requirement_ids_changed
    - source_ids_used
    - objects_changed
    - verification_results
    - relationship_integrity_result
    - manual_items
    - unresolved_conflicts
    - final_status